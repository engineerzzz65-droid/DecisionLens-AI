version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: decisionlens_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: decisionlens
      MYSQL_USER: decisionlens_user
      MYSQL_PASSWORD: decisionlens_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: decisionlens_backend
    environment:
      DATABASE_URL: mysql+pymysql://decisionlens_user:decisionlens_pass@mysql:3306/decisionlens
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_python_cache:/root/.cache

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: decisionlens_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data:
  backend_python_cache: